<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Antoinette Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0b; --bg2: #1a1810; --bg3: #221f14;
    --gold: #c9a22a; --gold2: #e8c87a;
    --text: #e8e0cc; --text2: #c8c0a8;
    --muted: #7a6a40; --muted2: #5a4a2a;
    --border: #3a3020; --border2: #2a2518;
    --green: #4a9a4a; --green2: #1a2a1a; --green3: #2a4a2a;
    --red: #aa7a7a; --red2: #2e1e1e;
    --ninja-bg: #0e1520; --ninja-border: #1a3050; --ninja-text: #5a9ada;
    --bbq-bg: #120d08; --bbq-border: #3a2010; --bbq-text: #c9903a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  h1,h2,h3 { font-family: 'Cormorant Garamond', serif; }

  .header { background: linear-gradient(135deg,#1a1508 0%,#0f0e0b 100%); border-bottom: 1px solid var(--border); padding: 24px 20px 16px; position: sticky; top:0; z-index:50; }
  .header-eyebrow { font-size:10px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
  .header-title-row { display:flex; align-items:baseline; gap:12px; }
  .header h1 { font-size:22px; font-weight:400; color:var(--gold2); }
  .save-status { font-size:11px; color:#6aaa6a; opacity:0; transition:opacity 0.3s; }
  .save-status.show { opacity:1; }
  .header-stats { font-size:11px; color:var(--muted); margin-top:4px; }
  .tabs { display:flex; gap:4px; margin-top:14px; }
  .tab { background:transparent; border:1px solid var(--border); color:var(--muted); padding:7px 18px; border-radius:4px; cursor:pointer; font-size:11px; letter-spacing:2px; text-transform:uppercase; font-family:'Jost',sans-serif; transition:all 0.2s; }
  .tab.active { background:var(--gold); border-color:var(--gold); color:var(--bg); font-weight:500; }

  .main { padding:16px; max-width:600px; margin:0 auto; }

  .pantry-intro { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:20px; font-size:13px; color:var(--muted); line-height:1.6; }
  .pantry-category { margin-bottom:22px; }
  .cat-label { font-size:10px; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:8px; }
  .pantry-item { display:flex; align-items:center; gap:12px; background:var(--bg2); border:1px solid var(--border2); border-radius:8px; padding:11px 14px; cursor:pointer; transition:background 0.15s,border-color 0.15s; user-select:none; margin-bottom:5px; }
  .pantry-item.checked { background:var(--green2); border-color:var(--green3); }
  .checkbox { width:20px; height:20px; border-radius:4px; border:2px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .pantry-item.checked .checkbox { background:var(--green); border-color:var(--green); }
  .checkbox-tick { color:#fff; font-size:12px; display:none; }
  .pantry-item.checked .checkbox-tick { display:block; }
  .pantry-label { font-size:14px; color:var(--text2); transition:all 0.15s; }
  .pantry-item.checked .pantry-label { color:#6aaa6a; text-decoration:line-through; }

  .filter-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .filter-btn { background:transparent; border:1px solid #2a3a30; color:#507060; padding:5px 12px; border-radius:20px; cursor:pointer; font-size:11px; font-family:'Jost',sans-serif; transition:all 0.15s; }
  .filter-btn.active-method { background:#1a3a5a; border-color:#2a6aaa; color:#7ab8e8; }
  .filter-btn.active-cuisine { color:#fff; }

  .recipe-list { display:flex; flex-direction:column; gap:9px; }
  .recipe-card { border-radius:10px; padding:13px 15px; cursor:pointer; border-left-width:4px; border-left-style:solid; border-top:1px solid; border-right:1px solid; border-bottom:1px solid; }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; }
  .card-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:5px; }
  .badge { font-size:9px; letter-spacing:1px; text-transform:uppercase; padding:2px 8px; border-radius:10px; }
  .badge-cuisine { color:#fff; }
  .badge-method { border:1px solid; }
  .card-name { font-family:'Cormorant Garamond',serif; font-size:16px; margin-bottom:2px; }
  .card-meta { font-size:11px; color:var(--muted2); }
  .card-missing { font-size:11px; color:var(--muted2); margin-top:5px; }
  .ready-badge { background:#1e3a1e; border:1px solid #3a6a3a; color:#6aaa6a; font-size:11px; padding:4px 10px; border-radius:20px; white-space:nowrap; flex-shrink:0; margin-left:10px; }
  .need-badge { background:#2a1e10; border:1px solid #5a3a1a; color:#aa8a5a; font-size:11px; padding:4px 10px; border-radius:20px; white-space:nowrap; flex-shrink:0; margin-left:10px; }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--bg2); border:1px solid var(--border); border-radius:16px 16px 0 0; padding:0 0 40px; width:100%; max-width:600px; max-height:90vh; overflow-y:auto; transform:translateY(20px); transition:transform 0.2s; }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-photo { width:100%; height:200px; object-fit:cover; border-radius:16px 16px 0 0; }
  .modal-photo-placeholder { width:100%; height:180px; border-radius:16px 16px 0 0; display:flex; align-items:center; justify-content:center; font-size:48px; }
  .modal-body { padding:20px 20px 0; }
  .modal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
  .modal-close { background:none; border:none; color:var(--muted); font-size:24px; cursor:pointer; line-height:1; padding:0 4px; position:absolute; top:12px; right:12px; background:rgba(0,0,0,0.5); border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; }
  .modal-title { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--gold2); font-weight:400; margin:6px 0 4px; }
  .modal-time { font-size:12px; color:var(--muted); }
  .modal-notice { border-radius:8px; padding:10px 13px; margin-bottom:14px; font-size:12px; line-height:1.5; }
  .notice-ninja { background:#0e1a2a; border:1px solid #1a3a5a; color:var(--ninja-text); }
  .notice-bbq { background:#1a0e05; border:1px solid #5a3010; color:#c97a3a; }
  .section-label { font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; margin-top:16px; }
  .ing-grid { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:4px; }
  .ing-tag { padding:4px 10px; border-radius:20px; font-size:12px; }
  .ing-have { background:#1e2e1e; border:1px solid #3a7a3a; color:#7aaa7a; }
  .ing-missing { background:var(--red2); border:1px solid #7a3a3a; color:var(--red); }
  .steps-list { margin-bottom:16px; }
  .step { display:flex; gap:11px; margin-bottom:14px; }
  .step-num { width:28px; height:28px; border-radius:50%; background:var(--gold); color:var(--bg); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:500; flex-shrink:0; margin-top:1px; }
  .step-text { font-size:14px; line-height:1.7; color:var(--text2); }
  .step-detail { font-size:12px; color:var(--muted); margin-top:3px; font-style:italic; }
  .tip-box { background:#1e1a0e; border:1px solid var(--border); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:11px 14px; margin-bottom:16px; }
  .tip-label { font-size:10px; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:3px; }
  .tip-text { font-size:13px; color:#a89870; line-height:1.5; }
  .ninja-tip { background:#0e1a2a; border:1px solid #1a3a5a; border-radius:10px; padding:11px 14px; margin-bottom:14px; font-size:12px; color:var(--ninja-text); line-height:1.6; }

  @media (max-width:400px) { .header h1 { font-size:19px; } .main { padding:12px; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">The Antoinette Kitchen</div>
  <div class="header-title-row">
    <h1 id="dishCount">Your Pantry System</h1>
    <span class="save-status" id="saveStatus">✓ Saved</span>
  </div>
  <div class="header-stats" id="headerStats">Loading...</div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('recipes')">🍳 Recipes</button>
    <button class="tab" onclick="showTab('pantry')">🛒 Pantry</button>
  </div>
</div>

<div class="main">
  <div id="recipesTab"></div>
  <div id="pantryTab" style="display:none"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent" style="position:relative"></div>
</div>

<script>
const PANTRY = {

  dairy: ["Butter","Parmesan / hard cheese","Heavy cream / coconut cream","Mozzarella / melting cheese","Yogurt (plain)"],

  seasonings: ["All-purpose seasoning","Slap Ya Mama seasoning","Black pepper","Paprika","Cumin","Italian seasoning","Curry powder","Taco seasoning","Thyme","Chili flakes / scotch bonnet","Chili powder","Garam masala","Five spice","Garlic powder","Salt","Bay leaves","Tomato paste","Jerk seasoning (jarred)","Baking powder","Mustard","Cinnamon"],

const CUISINE_COLORS = {
  Italian:"#c9542a", Asian:"#2a7ac9", "Middle Eastern":"#c9a22a",
  American:"#5a2ac9", Fusion:"#2ac987", Caribbean:"#c92a7a", Mexican:"#3aaa3a", Jamaican:"#d4820a"

const METHOD_ICONS = { Stovetop:"🔥", "Stovetop + Air Fryer":"🔥💨", "BBQ Grill":"🪵", Ninja:"🥘", "No Cook":"🥪" };

const PHOTO_SEARCH = {
  "Beef Bolognese":"beef bolognese pasta",
  "Chicken Stir-Fry":"chicken stir fry vegetables",
  "Chinese Salt & Pepper Chicken":"chinese salt pepper chicken crispy",

const RECIPES = [
  // ── JAMAICAN ──────────────────────────────────────────────
  {
    id:1, name:"Jamaican Fried Chicken", cuisine:"Jamaican", method:"Stovetop", ninja:false,
    time:"35 min active + 2–12 hrs marinating", serve:"Brown rice, festival, or sweet potato",
    emoji:"🍗",
    ingredients:["Chicken","Flour","Baking powder","All-purpose seasoning","Paprika","Garlic powder","Thyme","Chili flakes / scotch bonnet","Black pepper","Salt","Lime / lemon","Vinegar","Cooking oil"],
    steps:[
      {t:"Wash the chicken",d:"Squeeze 1 whole lime into a bowl of cold water, add 2 tbsp vinegar. Submerge chicken pieces and wash well. Rinse under cold water and pat completely dry with paper towel. Dry chicken is essential for crispy coating."},
      {t:"Season the chicken",d:"In a bowl mix: 2 tsp all-purpose seasoning, 1 tsp garlic powder, 1½ tsp paprika, 1 tsp thyme, 1 tsp black pepper, ½ tsp chili flakes, 1 tsp salt. Rub all over every piece of chicken, getting under the skin where possible. Cover bowl with cling wrap and refrigerate minimum 2 hours — overnight gives the best flavour."},
      {t:"Make the coating flour",d:"When ready to fry, mix in a wide bowl: 1½ cups flour, 1 tsp baking powder, 1 tsp paprika, 1 tsp garlic powder, 1 tsp salt, ½ tsp black pepper, ½ tsp thyme. Stir well to combine."},
      {t:"Coat the chicken",d:"Take each piece of marinated chicken and press firmly into the seasoned flour. Turn over and press again. Shake off any excess. Place coated pieces on a plate and let rest 5 minutes — this helps the coating stick during frying."},
      {t:"Fry the chicken",d:"Pour cooking oil into a deep pan — oil should come at least halfway up the chicken pieces. Heat on medium-high. Test oil by dropping a pinch of flour in — it should sizzle immediately. Add chicken pieces one at a time, do not crowd the pan — fry in 2 batches if needed. DO NOT touch or move for 7-8 minutes. You will see a deep golden crust forming. Flip once, cook another 7-8 minutes until deep golden brown all over."},
      {t:"Drain and rest",d:"Remove chicken with tongs and place on paper towel. Let rest 3-4 minutes before eating. The inside should show no pink when cut at the thickest point and juices should run clear."},
      {t:"Air fryer alternative",d:"Instead of shallow frying: coat chicken as above, spray or brush lightly with cooking oil. Air fry at 190°C for 22-25 minutes, flipping halfway. The result is slightly less greasy with a still-crispy coating. For extra crunch, do a quick 2 minute shallow fry first to set the crust, then finish in air fryer 15 minutes."}
    ],
    tip:"The baking powder in the coating flour is the Jamaican secret — it makes the crust lighter and crispier than just flour alone. Don't skip it."
  },
  {
    id:2, name:"Jerk Chicken", cuisine:"Jamaican", method:"Stovetop", ninja:false,
    time:"20 min active + 2–12 hrs marinating", serve:"Brown rice, quinoa, or sweet potato",
    emoji:"🌶️",
    ingredients:["Chicken","Jerk seasoning (jarred)","Lime / lemon","Garlic","All-purpose seasoning","Cooking oil","Black pepper"],
    steps:[
      {t:"Wash and prep chicken",d:"Wash chicken in lime water (squeeze 1 lime into cold water), rinse well, pat completely dry with paper towel."},
      {t:"Marinate",d:"Score chicken pieces with a knife — make 2-3 deep cuts into the thickest parts. This lets the seasoning penetrate deep. Rub 3-4 tbsp jarred jerk seasoning all over, add 2 minced garlic cloves, 1 tsp all-purpose seasoning, 1 tsp black pepper, squeeze of lime. Mix well with hands. Cover and refrigerate minimum 2 hours — overnight is best."},
      {t:"Cook the chicken",d:"Heat 2 tbsp cooking oil in pan on medium-high. Add chicken skin-side down. DO NOT move for 6-7 minutes until skin is deeply charred and caramelised — this is the authentic jerk flavour. Flip and cook another 6-7 minutes."},
      {t:"Finish low and slow",d:"Turn heat to LOW, cover with lid, cook another 10 minutes to ensure chicken is fully cooked through. Cut at thickest point — juices should run clear, no pink inside."},
      {t:"Rest and serve",d:"Rest 5 minutes before serving. Squeeze a little lime over the top."},
      {t:"Air fryer alternative",d:"After marinating, place chicken in air fryer at 190°C for 22-25 minutes flipping halfway. Brush any remaining marinade over the chicken halfway through. You get beautiful char marks and the jerk flavour develops really well — almost as good as the grill."}
    ],
    tip:"The char is not burning — it's flavour. Real jerk chicken is supposed to have those dark caramelised edges. Don't be afraid of the colour."
  },
  {
    id:3, name:"Jamaican Oxtail", cuisine:"Jamaican", method:"Ninja", ninja:true,
    time:"6–8 hrs (hands-off)", serve:"Brown rice or white rice",
    emoji:"🫕",
    ingredients:["Beef mince","Onion","Garlic","All-purpose seasoning","Thyme","Bay leaves","Black pepper","Salt","Soy sauce","Tomato paste","Ketchup","Chili flakes / scotch bonnet","Cooking oil","Canned chickpeas / kidney beans","Chicken stock"],
    steps:[
      {t:"Season the meat",d:"Note: traditionally oxtail uses bone-in oxtail pieces from the butcher — if you can get these, use them. Otherwise use thick beef stew pieces. Season generously with: 2 tsp all-purpose seasoning, 1 tsp black pepper, 1 tsp thyme, salt. Let sit 15 minutes minimum."},
      {t:"Brown the meat",d:"Set Ninja to Stovetop mode, heat 2 tbsp oil on high. Brown meat in batches — 3-4 minutes per side until deeply browned all over. Do not crowd. Set browned meat aside. This step builds the deep flavour."},
      {t:"Build the base",d:"In same Ninja pot, sauté 1 large diced onion and 4 minced garlic cloves on medium for 3 minutes. Add 2 tbsp tomato paste + 2 tbsp ketchup + 1 tbsp soy sauce, stir and cook 2 minutes."},
      {t:"Slow cook",d:"Return meat to pot. Add 1 cup chicken stock, 2 bay leaves, 1 sprig thyme, chili flakes to taste. Stir everything together. Switch Ninja to Slow Cook LOW. Cook 6-8 hours — meat should be completely fall-apart tender and sauce thick and glossy."},
      {t:"Add butter beans",d:"In last 30 minutes of cooking, add 1 drained can of kidney beans or butter beans. Stir in, replace lid, continue cooking."},
      {t:"Final seasoning",d:"Remove bay leaves. Taste sauce and adjust salt and pepper. Sauce should be thick, dark and rich. Serve over white or brown rice."}
    ],
    tip:"Oxtail needs long slow heat to break down the collagen into that signature sticky, rich sauce. Don't rush it — 8 hours is better than 6. The longer it cooks the better it gets."
  },
  {
    id:4, name:"BBQ Chicken (Grill)", cuisine:"Jamaican", method:"BBQ Grill", ninja:false,
    time:"35 min", serve:"Brown rice, quinoa, sweet potato, or kabocha pumpkin",
    emoji:"🔥",
    ingredients:["Chicken","Ketchup","Garlic","Lime / lemon","All-purpose seasoning","Slap Ya Mama seasoning","Black pepper","Thyme","Chili flakes / scotch bonnet","Cooking oil"],
    steps:[
      {t:"Make the glaze",d:"In a small bowl mix: 3 tbsp ketchup, 2 minced garlic cloves, juice of 1 lime, 1 tsp chili flakes, 1 tsp Slap Ya Mama. Stir well and set aside."},
      {t:"Season the chicken",d:"Rub chicken pieces with: 1 tsp cooking oil, 1 tsp all-purpose seasoning, 1 tsp black pepper, ½ tsp thyme. Let sit 10 minutes while grill preheats."},
      {t:"Grill",d:"Preheat grill on medium heat 10 minutes. Place chicken on grill, close lid. Cook 6-7 minutes per side without touching. You should see clear grill marks form before flipping."},
      {t:"Apply glaze",d:"In the last 5 minutes only, brush the glaze generously over the chicken. Watch closely — the ketchup caramelises fast and can go from perfect to burnt in under a minute."},

    ],
    tip:"Glaze goes on at the end only — the sugar in ketchup burns if you add it early. That last 5 minutes is all you need for that beautiful sticky finish."
  },

  // ── ITALIAN ───────────────────────────────────────────────
  {
    id:5, name:"Beef Bolognese", cuisine:"Italian", method:"Stovetop", ninja:false,
    time:"45 min", serve:"Pasta",
    emoji:"🍝",
    ingredients:["Beef mince","Pasta (spaghetti/penne)","Onion","Garlic","Canned tomatoes","Tomato paste","Olive oil","Carrots","Italian seasoning","Black pepper","Salt","Chicken stock"],
    steps:[
      {t:"Sauté the base",d:"Heat 2 tbsp olive oil in a wide pan on medium heat. Add 1 large finely diced onion and 2 finely diced or grated carrots. Cook 5 minutes stirring until softened and slightly golden. Add 4 minced garlic cloves, cook 1 more minute."},
      {t:"Brown the mince",d:"Turn heat to medium-high. Add 500g beef mince. Break up immediately with a wooden spoon into small pieces. Cook 6-7 minutes, stirring often, until no pink remains and mince is lightly browned. Do not let it steam — if it releases too much water, turn heat up."},
      {t:"Add tomato paste",d:"Push mince to sides of pan. Add 2 tbsp tomato paste to centre of pan, cook in the oil for 2 minutes stirring — this removes the raw taste and deepens the flavour."},
      {t:"Add tomatoes and simmer",d:"Pour in 1 can chopped tomatoes + ½ cup chicken stock. Add 2 tsp Italian seasoning, 1 tsp black pepper, 1 tsp salt. Stir everything together. Bring to boil then reduce to low. Simmer uncovered 20-25 minutes stirring occasionally until sauce thickens."},
      {t:"Cook pasta and combine",d:"Cook pasta in well-salted boiling water according to package — al dente means still has a slight bite. Reserve 1 cup pasta water before draining. Add drained pasta to sauce, toss well. Add a splash of pasta water to loosen if too thick."}
    ],
    tip:"Grating the carrot fine makes it melt into the sauce and adds natural sweetness — it disappears completely but makes a big difference to the flavour."
  },
  {
    id:6, name:"Creamy Chicken Pasta", cuisine:"Italian", method:"Stovetop", ninja:false,
    time:"30 min", serve:"Pasta",
    emoji:"🍝",
    ingredients:["Chicken","Pasta (spaghetti/penne)","Heavy cream / coconut cream","Garlic","Onion","Parmesan / hard cheese","Butter","Chicken stock","Black pepper","Salt","Italian seasoning"],
    steps:[
      {t:"Cook the pasta",d:"Boil pasta in well-salted water until al dente — about 2 minutes less than the packet says. Before draining, scoop out 1 full cup of pasta water and set aside. Drain pasta."},

// STORAGE
let checked = {};
let activeTab = 'recipes';
let methodFilter = 'All';
let cuisineFilter = 'All';

function loadData() {
  try { checked = JSON.parse(localStorage.getItem('antoinette_pantry_v2') || '{}'); } catch { checked = {}; }
}
function saveData() {
  try {
    localStorage.setItem('antoinette_pantry_v2', JSON.stringify(checked));
    const s = document.getElementById('saveStatus');
    s.classList.add('show');
    setTimeout(() => s.classList.remove('show'), 1500);
  } catch(e) {}
}
function toggleItem(item) {
  checked[item] = !checked[item];
  saveData();
  updateStats();
  renderPantry();
  renderRecipes();
}

function updateStats() {
  const allItems = Object.values(PANTRY).flat();
  const total = allItems.length;
  const have = allItems.filter(i => checked[i]).length;
  const ready = RECIPES.filter(r => r.ingredients.every(i => checked[i])).length;
  document.getElementById('headerStats').textContent = `${have}/${total} stocked · ${ready} ready to cook`;
  document.getElementById('dishCount').textContent = `Your ${RECIPES.length}-Dish Pantry System`;
}

function showTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='recipes')||(i===1&&tab==='pantry')));
  document.getElementById('recipesTab').style.display = tab === 'recipes' ? '' : 'none';
  document.getElementById('pantryTab').style.display = tab === 'pantry' ? '' : 'none';
}

function getMissing(recipe) { return recipe.ingredients.filter(i => !checked[i]); }

function renderPantry() {
  const container = document.getElementById('pantryTab');
  let html = `<div class="pantry-intro">Check off items as you buy them. Your pantry saves automatically. Recipes sort by what you can cook right now.</div>`;
  for (const [cat, items] of Object.entries(PANTRY)) {
    const label = cat.replace(/([A-Z])/g,' $1').trim();
    html += `<div class="pantry-category"><div class="cat-label">${label}</div>`;
    for (const item of items) {
      const isChecked = !!checked[item];
      html += `<div class="pantry-item ${isChecked?'checked':''}" onclick="toggleItem(${JSON.stringify(item)})">
        <div class="checkbox"><span class="checkbox-tick">✓</span></div>
        <span class="pantry-label">${item}</span>
      </div>`;
    }
    html += `</div>`;
  }
  container.innerHTML = html;
}

function getPhotoUrl(recipeName) {
  const query = PHOTO_SEARCH[recipeName] || recipeName.toLowerCase();
  return `https://source.unsplash.com/800x400/?${encodeURIComponent(query)},food`;
}

function renderRecipes() {
  const container = document.getElementById('recipesTab');
  const allMethods = ['All','Stovetop','Ninja','BBQ Grill','Stovetop + Air Fryer','No Cook'];
  const allCuisines = ['All',...new Set(RECIPES.map(r=>r.cuisine))];

  let html = `<div class="ninja-tip">🥘 <strong>Ninja tip:</strong> Filter by Ninja to see slow-cook meals — start one before you leave, dinner is ready when you get home.</div>`;

  html += `<div class="filter-row">`;
  const methodLabels = {'All':'All','Stovetop':'🔥 Stovetop','Stovetop + Air Fryer':'💨 Air Fryer','BBQ Grill':'🪵 BBQ','Ninja':'🥘 Ninja','No Cook':'🥪 No Cook'};
  for (const m of allMethods) {
    html += `<button class="filter-btn ${methodFilter===m?'active-method':''}" onclick="setMethod('${m}')">${methodLabels[m]||m}</button>`;
  }
  html += `</div><div class="filter-row">`;
  for (const c of allCuisines) {
    const color = CUISINE_COLORS[c]||'#444';
    const isActive = cuisineFilter===c;
    html += `<button class="filter-btn ${isActive?'active-cuisine':''}" style="${isActive?`background:${color};border-color:${color}`:`border-color:#3a3020`}" onclick="setCuisine('${c.replace(/'/g,"\\'")}')">${c}</button>`;
  }
  html += `</div>`;

  const filtered = RECIPES
    .filter(r=>(methodFilter==='All'||r.method===methodFilter)&&(cuisineFilter==='All'||r.cuisine===cuisineFilter))
    .sort((a,b)=>getMissing(a).length-getMissing(b).length);

  html += `<div class="recipe-list">`;
  for (const r of filtered) {
    const missing = getMissing(r);
    const ready = missing.length===0;
    const color = CUISINE_COLORS[r.cuisine]||'#555';
    const isBBQ = r.method==='BBQ Grill';
    const bgColor = r.ninja?'#0e1520':isBBQ?'#120d08':'#1a1810';
    const borderColor = ready?'#2a4a2a':r.ninja?'#1a3050':isBBQ?'#3a2010':'#2a2518';
    const leftColor = ready?'#4a9a4a':r.ninja?'#2a6aaa':isBBQ?'#7a4a1a':color;
    const nameColor = r.ninja?'#7ab8ea':isBBQ?'#c9903a':'#e8c87a';
    html += `<div class="recipe-card" style="background:${bgColor};border-color:${borderColor};border-left-color:${leftColor}" onclick="openRecipe(${r.id})">
      <div class="card-top">
        <div style="flex:1">
          <div class="card-badges">
            <span class="badge badge-cuisine" style="background:${color}">${r.cuisine}</span>
            <span class="badge badge-method" style="background:${r.ninja?'#1a2a3a':isBBQ?'#2a1a0a':'#1e1a0e'};border-color:${r.ninja?'#2a5a8a':isBBQ?'#7a4a1a':'#3a3020'};color:${r.ninja?'#5a9ada':isBBQ?'#c97a3a':'#7a6a40'}">${METHOD_ICONS[r.method]||''} ${r.method}</span>
          </div>
          <div class="card-name" style="color:${nameColor}">${r.emoji} ${r.name}</div>
          <div class="card-meta">⏱ ${r.time} · 🍽 ${r.serve}</div>
        </div>
        ${ready?`<div class="ready-badge">✓ Ready</div>`:`<div class="need-badge">Need ${missing.length}</div>`}
      </div>
      ${!ready&&missing.length>0?`<div class="card-missing">Missing: ${missing.slice(0,3).join(', ')}${missing.length>3?' +'+(missing.length-3)+' more':''}</div>`:''}
    </div>`;
  }
  html += `</div>`;
  container.innerHTML = html;
}

function setMethod(m) { methodFilter=m; renderRecipes(); }
function setCuisine(c) { cuisineFilter=c; renderRecipes(); }

function openRecipe(id) {
  const r = RECIPES.find(x=>x.id===id);
  if(!r) return;
  const color = CUISINE_COLORS[r.cuisine]||'#555';
  const isBBQ = r.method==='BBQ Grill';
  const photoUrl = getPhotoUrl(r.name);

  let html = `<img src="${photoUrl}" class="modal-photo" alt="${r.name}" onerror="this.style.display='none'">`;
  html += `<button class="modal-close" onclick="closeModalBtn()">×</button>`;
  html += `<div class="modal-body">`;
  html += `<div class="card-badges" style="margin-bottom:6px">
    <span class="badge badge-cuisine" style="background:${color}">${r.cuisine}</span>
    <span class="badge badge-method" style="background:${r.ninja?'#1a2a3a':'#1e1a0e'};border-color:${r.ninja?'#2a5a8a':'#3a3020'};color:${r.ninja?'#5a9ada':'#7a6a40'}">${METHOD_ICONS[r.method]||''} ${r.method}</span>
  </div>`;
  html += `<div class="modal-title">${r.emoji} ${r.name}</div>`;
  html += `<div class="modal-time">⏱ ${r.time} &nbsp;·&nbsp; 🍽 ${r.serve}</div>`;

  if(r.ninja) html += `<div class="modal-notice notice-ninja" style="margin-top:12px">🥘 <strong>Ninja:</strong> Brown on Stovetop mode first, then switch to Slow Cook LOW and leave it.</div>`;
  if(isBBQ) html += `<div class="modal-notice notice-bbq" style="margin-top:12px">🪵 <strong>BBQ Grill:</strong> Preheat grill 10 minutes before cooking. Keep lid closed between flips to hold heat.</div>`;

  html += `<div class="section-label">Ingredients</div><div class="ing-grid">`;
  for(const ing of r.ingredients) {
    html += `<span class="ing-tag ${checked[ing]?'ing-have':'ing-missing'}">${checked[ing]?'✓':'✗'} ${ing}</span>`;
  }
  html += `</div>`;

  html += `<div class="section-label">Method</div><div class="steps-list">`;
  r.steps.forEach((step,i) => {
    html += `<div class="step">
      <div class="step-num">${i+1}</div>
      <div>
        <div class="step-text"><strong>${step.t}</strong></div>
        <div class="step-detail">${step.d}</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  html += `<div class="tip-box"><div class="tip-label">Chef's Tip</div><div class="tip-text">${r.tip}</div></div>`;
  html += `</div>`;

  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) { if(e.target===document.getElementById('modalOverlay')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('modalOverlay').classList.remove('open'); }

loadData();
updateStats();
renderPantry();
renderRecipes();
</script>
</body>
</html>
